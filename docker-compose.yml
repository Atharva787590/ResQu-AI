version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8080"
    environment:
      - DATABASE_URL=sqlite:////code_data/database.db
      - GOOGLE_GENAI_USE_VERTEXAI=False
      # Optional: Add your Gemini API key here for live AI coordination
      # - GOOGLE_API_KEY=your_gemini_api_key
    volumes:
      - backend_db:/code_data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  backend_db:
